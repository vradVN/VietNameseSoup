<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./asset/CSS/style.css" />
    <title>Vietnamese Soup</title>
  </head>
  <body>
    <header id="header">
      <h1>Soup</h1>
      <!--Tên của web-->
      <ul>
        <!--do nav bar có dạng danh sách. dùng ul element-->
        <li><a href="#home">Home</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </header>
    <section id="intro">
      <!--đặt id phần giới thiệu là intro-->
      <h2>Welcome to My Shop</h2>
      <div class="intro-banner">
        <img src="" alt="" />
      </div>
      <p>decription</p>
    </section>
    <section id="products">
      <!--đặt id cho danh sách món ăn là products-->
      <div class="product">
        <!--đặt class cho product là product-->
        <figure>
          <a href="product-detail.html" target="_blank"
            ><img src="./asset/imges/buncha.webp" alt="bún chả Hà Nội"
          /></a>
          <!--ảnh bún chả được dẫn từ link-->
          <figcaption>
            <h3>Bún chả Hà Nội</h3>
            <!--tiêu đề h3, tên-->
            <p>Giá: 50,000 VNĐ</p>
            <!--thẻ thêm đoạn văn p-->
            <p>Mô tả:</p>
            <a href="">Xem chi tiết</a
            ><!--gắn mỏ neo cho "link mua" để dẫn tới địa chỉ của href-->
          </figcaption>
        </figure>
      </div>
      <div class="product">
        <img src="./asset/imges/Pho.png" alt="Phở bò" />
        <h3>Phở Bò Hà Nội</h3>
        <p>Giá: 70,000 VNĐ</p>
        <p>Mô tả:</p>
        <a href="">Xem chi tiết</a>
      </div>
      <div class="product">
        <img src="./asset/imges/bc_botxat.jpg" alt="Bánh canh bột xắt" />
        <h3>Bún chả hà nội</h3>
        <p>Giá: 35,000 VNĐ</p>
        <p>Mô tả:</p>
        <a href="">Xem chi tiết</a>
      </div>
    </section>
    <p>&lt; 1 2 3 4 5 &gt;</p>
    <footer id="contact">
      <h2>Liên hệ</h2>
      <h3>Nhập tên: <input type="text" /></h3>
      <h3>Nhập email: <input type="text" /></h3>
      <button>Gửi</button>
    </footer>
  </body>
</html>
