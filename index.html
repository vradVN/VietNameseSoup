<!--Home page
slide món ăn,slide các nhà hàng, đánh giá, độ tin cậy, tại sao lại chọn chúng tôi,
có thanh tiềm kiếm dựa trên đồ ăn, nhà hàng-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Welcome to the best Vietnamese food!" />
    <!--thẻ meta này giúp seo đọc được nội dung tổng quan của website-->
    <link rel="stylesheet" href="./asset/CSS/style.css" />
    <title>Welcome to the best Vietnamese food!</title>
  </head>
  <body>
    <header id="header">
      <!--thẻ này sẽ bao gồm logo và các liên kết điều hướng-->
      <div class="logo">
        <h1>Vietnamese Soup</h1>
        <img src="" alt="logo WEB" />
      </div>
      <ul class="nav">
        <!--do nav bar có dạng danh sách. dùng ul element-->
        <li><a href="#home">Home</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="cart">
        <a href="cart.html">Cart</a>
      </div>
      <div class="login">
        <a href="login.html">Login</a>
      </div>
    </header>
    <section id="intro">
      <!--đặt id phần giới thiệu là intro-->
      <h2>Welcome to My Shop</h2>
      <div class="intro-banner">
        <img src="" alt="" />
      </div>
      <p>description</p>
    </section>
    <section id="widget-order">
      <div class="widget-orderbox">
        <!--thẻ này bao hết các thành phần con trong bảng-->
        <div class="date"></div>
        <div class="time"></div>
        <div class="portions-foods"></div>
        <div class="location"></div>
        <div class="act-btn"></div>
      </div>
    </section>
    <section id="wrapper-content">
      <!--thẻ này sẽ bao hết không gian nội dung từ đoạn intro tới footer-->
      <div class="restaurent-carousel">
        <h3>Available now</h3>
        <div class="products">
          <!--đặt id cho danh sách món ăn là products-->
          <div class="product">
            <!--đặt class cho product là product-->
            <figure>
              <a href="product-detail.html" target="_blank"
                ><img src="./asset/imges/buncha.webp" alt="bún chả Hà Nội"
              /></a>
              <!--ảnh bún chả được dẫn từ link-->
              <figcaption>
                <h3>Bún chả Hà Nội</h3>
                <!--tiêu đề h3, tên-->
                <p>Giá: 50,000 VNĐ</p>
                <!--thẻ thêm đoạn văn p-->
                <p>Mô tả:</p>
                <a href="product-detail.html">Xem chi tiết</a
                ><!--gắn mỏ neo cho "link mua" để dẫn tới địa chỉ của href-->
              </figcaption>
            </figure>
          </div>
          <div class="product">
            <figure>
              <a href="product-detail.html" target="_blank"
                ><img src="./asset/imges/Pho.png" alt="Phở bò"
              /></a>
              <figcaption>
                <h3>Phở Bò Hà Nội</h3>
                <p>Giá: 70,000 VNĐ</p>
                <p>Mô tả:</p>
                <a href="product-detail.html">Xem chi tiết</a>
              </figcaption>
            </figure>
          </div>
          <div class="product">
            <figure>
              <a href="product-detail.html" target="_blank"
                ><img src="./asset/imges/bc_botxat.jpg" alt="Bánh canh bột xắt"
              /></a>
              <figcaption>
                <h3>Bánh canh bột xắt</h3>
                <p>Giá: 40,000 VNĐ</p>
                <p>Mô tả:</p>
                <a href="product-detail.html">Xem chi tiết</a>
              </figcaption>
            </figure>
          </div>
        </div>
      </div>
      <p>&lt; 1 2 3 4 5 &gt;</p>
    </section>

    <footer id="contact">
      <h2>Liên hệ</h2>
      <h3>Nhập tên: <input type="text" /></h3>
      <h3>Nhập email: <input type="text" /></h3>
      <button>Gửi</button>
    </footer>
  </body>
</html>
